<!DOCTYPE html><html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnia 💖</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: #fff;
    }.card {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  max-width: 400px;
  animation: fadeIn 1.5s ease-in-out;
}

h1 {
  font-size: 2.5em;
  margin-bottom: 10px;
}

p {
  font-size: 1.2em;
  line-height: 1.6;
}

.heart {
  font-size: 2em;
  animation: beat 1s infinite;
  margin: 15px 0;
}

@keyframes beat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

  </style>
</head>
<body>
  <div class="card">
    <h1>Omnia 💖</h1>
    <div class="heart">❤️</div>
    <p>
      بصي يا أمنية...<br><br>
      وجودك في حياتي مش حاجة عادية خالص،<br>
      إنتي شخص مميز بطريقة صعب تتكرر.<br><br>
      ضحكتك، طريقتك، كلامك... كله ليه تأثير مختلف.<br>
      وفعلاً بكون مبسوط وأنا بكلمك.<br><br>
      خلي بالك من نفسك دايمًا ❤️
    </p>
  </div>
</body>
</html>
